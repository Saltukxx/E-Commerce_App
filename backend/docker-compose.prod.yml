services:
  api:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://durmus:${POSTGRES_PASSWORD}@db:5432/durmus_baba?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3000
    ports:
      - "${API_PORT:-3001}:3000"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: durmus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: durmus_baba
    volumes:
      - durmus_pg_data:/var/lib/postgresql/data

volumes:
  durmus_pg_data:

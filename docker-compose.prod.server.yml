services:
  api:
    build: ./backend
    container_name: ecommerce-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://durmus:${POSTGRES_PASSWORD}@durmus-backend-db-1:5432/durmus_baba?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3000
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      ALLOW_UNPAID_ORDERS: ${ALLOW_UNPAID_ORDERS:-true}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_ONBOARD_REFRESH_URL: ${STRIPE_ONBOARD_REFRESH_URL:-}
      STRIPE_ONBOARD_RETURN_URL: ${STRIPE_ONBOARD_RETURN_URL:-}
      PLATFORM_FEE_PERCENT: ${PLATFORM_FEE_PERCENT:-0}
      STRIPE_MULTI_VENDOR: ${STRIPE_MULTI_VENDOR:-false}
    ports:
      - "${API_PORT:-3001}:3000"
    volumes:
      - product_images:/app/uploads
    networks:
      - durmus-backend_default

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://167.172.168.81/api/v1}
        NEXT_PUBLIC_UPLOADS_BASE: ${NEXT_PUBLIC_UPLOADS_BASE:-http://167.172.168.81}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      PORT: 3000
      API_INTERNAL_URL: http://api:3000/api/v1
    networks:
      - durmus-backend_default

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - durmus-backend_default

networks:
  durmus-backend_default:
    external: true

volumes:
  product_images:
    external: true
    name: product_images
